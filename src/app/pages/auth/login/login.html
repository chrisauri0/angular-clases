<div class="login-container">
    <p-card header="Iniciar Sesión">
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="p-fluid">

            <div class="field">
                <label for="email">Correo</label>
                <input id="email" type="text" pInputText formControlName="email" placeholder="correo@ejemplo.com" />

                <small class="p-error" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
                    Ingresa un correo válido
                </small>
            </div>

            <div class="field">
                <label for="password">Contraseña</label>
                <p-password formControlName="password" [feedback]="false" [toggleMask]="true" placeholder="********">
                </p-password>

                <small class="p-error" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                    La contraseña es obligatoria
                </small>
            </div>

            <button pButton type="submit" label="Ingresar" icon="pi pi-sign-in" [loading]="loading" class="p-mt-3">
            </button>

        </form>
    </p-card>
</div>
