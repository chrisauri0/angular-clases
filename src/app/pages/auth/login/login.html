<div class="login-container">
  <p-card header="Iniciar Sesión">
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="p-fluid">

      <div class="field">
        <label for="email">Correo</label>
        <input id="email" type="text" pInputText formControlName="email" placeholder="correo@ejemplo.com" />

        @if (loginForm.get('email')?.invalid && loginForm.get('email')?.touched) {
          <small class="p-error">
            Ingresa un correo válido
          </small>
        }
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <p-password formControlName="password" [feedback]="false" [toggleMask]="true" placeholder="********">
        </p-password>

        @if (loginForm.get('password')?.invalid && loginForm.get('password')?.touched) {
          <small class="p-error">
            La contraseña es obligatoria
          </small>
        }
      </div>

      <button pButton type="submit" label="Ingresar" icon="pi pi-sign-in" [loading]="loading" class="p-mt-3">
      </button>

    </form>
  </p-card>
</div>
