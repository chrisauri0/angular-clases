<div class="grupos-container">
    <div class="secciones">
        <h1>Total</h1>
        <!-- contador de grupos -->
        <p-card>
            <p>N</p>
        </p-card>
    </div>
    <div class="secciones">
        <h1>Advance</h1>

        <p-card>
            card de prueba
        </p-card>
        <p-toast />

    </div>
    <p-button (click)="showDialog()" label="Show" />
    <p-dialog header="Crea un grupo" [(visible)]="visible" [style]="{ width: '25rem' }">
        <p-card header="" class="p-mb-4 p-shadow-3 p-p-4">
            <div class="card flex justify-center p-mb-4">
                <p-floatlabel class="">
                    <input id="username" name="nivel" pInputText [(ngModel)]="nivel" autocomplete="off" />
                    <label for="username">Nivel </label>
                </p-floatlabel>
                <p-floatlabel class="">
                    <input id="email" name="autor" pInputText [(ngModel)]="autor" autocomplete="off" />
                    <label for="email">autor</label>
                </p-floatlabel>
                <p-floatlabel>
                    <input id="password" name="nombre" pInputText [(ngModel)]="nombre" autocomplete="off"
                        type="password" />
                    <label for="password">nombre</label>
                </p-floatlabel>
                <p-floatlabel>
                    <input id="direccion" name="integrantes" pInputText [(ngModel)]="integrantes" autocomplete="off" />
                    <label for="direccion">integrantes</label>
                </p-floatlabel>
                <p-floatlabel>
                    <input id="tickets" name="tickets" pInputText [(ngModel)]="tickets" autocomplete="off" />
                    <label for="tickets">tickets</label>
                </p-floatlabel>
                <p-floatlabel>
                    <input id="descripcion" name="descripcion" pInputText [(ngModel)]="descripcion"
                        autocomplete="off" />
                    <label for="descripcion">descripcion</label>
                </p-floatlabel>


            </div>
        </p-card>
        <div class="flex justify-end gap-2">
            <p-button label="Cancel" severity="secondary" (click)="visible = false" />
            <p-button type="button" label="Save" pRipple (click)="visible = false" (click)="showSuccess()"
                severity="success" />
        </div>
    </p-dialog>



    <div class="card">
        <p-table [value]="grupos" [tableStyle]="{ 'min-width': '50rem' }">
            <ng-template #header>
                <tr>
                    <th>Code</th>
                    <th>Name</th>
                    <th>Nivel</th>
                    <th>Integrantes</th>
                </tr>
            </ng-template>
            <ng-template #body let-grupo>
                <tr>
                    <td>{{ grupo.id }}</td>
                    <td>{{ grupo.nombre }}</td>
                    <td>{{ grupo.nivel }}</td>
                    <td>{{ grupo.integrantes }}</td>
                </tr>
            </ng-template>
        </p-table>
    </div>



</div>
<style>
    .secciones {
        display: flex;
        gap: 20px;
        padding: 20px;
    }


    .p-floatlabel {

        margin-bottom: 2rem;
    }
</style>
