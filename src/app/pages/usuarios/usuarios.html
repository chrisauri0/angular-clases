<div class="usuarios-container">
    <div
        class="   w-full min-h-screen bg-gradient-to-br from-gray-800 to-gray-900 flex items-center justify-center p-6">
        <div class="w-full max-w-4xl bg-white/10 rounded-2xl shadow-lg p-8 flex flex-col md:flex-row gap-8">
            <!-- Perfil -->
            <div class="flex-1 flex flex-col gap-6 bg-white/5 rounded-xl p-6">
                <h1 class="text-2xl font-bold text-white mb-2">Datos del perfil</h1>
                <p-floatlabel class="mb-6">
                    <input id="username" pInputText [(ngModel)]="nombre" autocomplete="off"
                        class="w-full px-4 py-2 rounded-lg bg-gray-800 text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    <label for="username" class="text-gray-300">Username</label>
                </p-floatlabel>
                <p-floatlabel class="mb-6">
                    <input id="email" pInputText [(ngModel)]="email" autocomplete="off"
                        class="w-full px-4 py-2 rounded-lg bg-gray-800 text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    <label for="email" class="text-gray-300">Email</label>
                </p-floatlabel>
                <p-floatlabel class="mb-6">
                    <input id="password" pInputText [(ngModel)]="password" autocomplete="off" type="password"
                        class="w-full px-4 py-2 rounded-lg bg-gray-800 text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    <label for="password" class="text-gray-300">Password</label>
                </p-floatlabel>
                <p-floatlabel class="mb-6">
                    <input id="direccion" pInputText [(ngModel)]="direccion" autocomplete="off"
                        class="w-full px-4 py-2 rounded-lg bg-gray-800 text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    <label for="direccion" class="text-gray-300">Dirección</label>
                </p-floatlabel>
                <p-toast />
                <p-button type="button" label="Guardar cambios" pRipple (click)="showSuccess()" severity="success"
                    class="w-full mt-2" />
            </div>
            <!-- Tickets -->
            <div class="flex-1 flex flex-col gap-6 justify-center">
                <h1 class="text-2xl font-bold text-white mb-2">Tickets asignados</h1>
                <div class="flex flex-row gap-4 justify-center items-stretch mt-4">
                    <p-card header="Tickets Pendientes" class="flex-1 bg-green-700/80 rounded-lg shadow-md">
                        <h2 class="text-center text-white text-3xl font-bold">2</h2>
                    </p-card>
                    <p-card header="Tickets Resueltos" class="flex-1 bg-orange-500/80 rounded-lg shadow-md">
                        <h2 class="text-center text-white text-3xl font-bold">6</h2>
                    </p-card>
                    <p-card header="Tickets Cerrados" class="flex-1 bg-red-600/80 rounded-lg shadow-md">
                        <h2 class="text-center text-white text-3xl font-bold">8</h2>
                    </p-card>
                </div>
            </div>
        </div>




    </div>

    <div>

        <app-gestion-usuarios *ifHasPermission="'usuarios:crear'"></app-gestion-usuarios>
    </div>
</div>





<style>
    .usuarios-container {
        width: 90dvw;
    }
</style>
